<div class="flex flex-col h-screen bg-white dark:bg-gray-900">
  <!-- Header -->
  <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200 dark:border-gray-700">
    <h1 class="text-xl font-semibold">New Article</h1>
    <div class="flex gap-2">
      <button
        class="px-3 py-2 rounded border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-800"
        (click)="cancel()"
      >
        Cancel
      </button>
      <button
        class="px-3 py-2 rounded bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50"
        [disabled]="form.invalid"
        (click)="save()"
      >
        Save
      </button>
    </div>
  </div>

  <!-- Body -->
  <div class="flex-1 overflow-auto p-4">
    <form [formGroup]="form" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block mb-1 font-medium">Title</label>
          <input
            type="text"
            formControlName="title"
            class="w-full px-3 py-2 border rounded bg-white dark:bg-gray-900"
          />
        </div>

        <div>
          <label class="block mb-1 font-medium">Category</label>
          <input
            type="text"
            formControlName="category"
            class="w-full px-3 py-2 border rounded bg-white dark:bg-gray-900"
          />
        </div>
      </div>

      <div>
        <label class="block mb-2 font-medium">Content</label>
        <div class="min-h-[420px]">
          <ckeditor
            [editor]="Editor"
            formControlName="content"
            [config]="editorConfig"
          ></ckeditor>
        </div>
      </div>
    </form>
  </div>
</div>
